services:
  - type: web
    name: jaipur-pharmacy-bot
    env: node
    region: singapore  # closest to India
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false   # set manually in Render dashboard
      - key: MONGODB_URI
        sync: false   # set manually in Render dashboard
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: SOS_ALERT_CHAT_ID
        sync: false
      - key: WEBHOOK_DOMAIN
        sync: false   # set to your render URL e.g. https://jaipur-pharmacy-bot.onrender.com
